services:
  postgres-db:
    image: postgres:18-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: postgres_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    networks:
      - docker-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cluster (3 Masters, 3 Replicas)
  redis-cluster:
    image: grokzen/redis-cluster:7.2.5
    container_name: redis-cluster
    environment:
      - IP=0.0.0.0
      - INITIAL_PORT=6379
      - MASTERS=3
      - SLAVES_PER_MASTER=1
      - REDIS_PASSWORD=password
      # Locale Fixes
      - LC_ALL=C
      - LANG=C
    networks:
      - docker-network
    ports:
      - "6379:6379"
      - "6380:6380"
      - "6381:6381"
      - "6382:6382"
      - "6383:6383"
      - "6384:6384"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "-a", "password", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  docker-network:
    driver: bridge